name: Weekly scan

on:
  schedule:
    # Mondays at 13:00 UTC (~9am ET). Adjust to taste.
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      send_email:
        description: "Send the email (false = build outputs only)"
        type: boolean
        default: true

permissions:
  contents: write   # commit data/ + site/
  pages: write
  id-token: write

concurrency:
  group: weekly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly scan
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.send_email }}" = "false" ]; then
            python -m seedsummary run --no-email --verbose
          else
            python -m seedsummary run --verbose
          fi

      - name: Commit data + watchlist updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ config/watchlist.yml || true
          git diff --cached --quiet || git commit -m "chore: weekly scan results $(date -u +%F)"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
