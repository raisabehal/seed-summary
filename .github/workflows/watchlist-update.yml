name: Watchlist update

# When you pick companies in the dashboard it opens a prefilled issue labeled
# "watchlist". This workflow parses that issue, merges the companies into
# config/watchlist.yml, commits, and closes the issue.

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  issues: write

jobs:
  update:
    if: contains(join(github.event.issue.labels.*.name, ','), 'watchlist')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install PyYAML

      - name: Merge selections into watchlist
        id: merge
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python scripts/update_watchlist.py | tee result.txt

      - name: Commit watchlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/watchlist.yml
          git diff --cached --quiet || git commit -m "chore: update watchlist from #${{ github.event.issue.number }}"
          git push || true

      - name: Comment and close issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let result = 'Watchlist processed.';
            try { result = fs.readFileSync('result.txt','utf8').trim(); } catch (e) {}
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ ${result}\n\nYou'll get new-role alerts for these companies in your weekly digest.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });
